mega_driver:
  ros__parameters:
    # Mega-side conversion from requested arm position in meters to firmware steps.
    # Must match the mechanical setup and the constants in the Mega runtime firmware.
    arm_x_steps_per_mm: 18.65
    arm_z_steps_per_mm: 2929.0

    # Assumed arm state before Mega reports a homed state.
    # Must match HOME ARM in mega_total_code_nonblocking.
    initial_arm_x_m: -0.07
    initial_arm_z_m: 0.13

    # Polling for Mega STATE feedback. Lower values increase serial load and can
    # disturb smooth arm stepping on the Arduino.
    arm_state_poll_period_s: 0.25
    arm_motion_timeout_s: 180.0
    init_distance_sensor_on_connect: true

    # Servo pulse range used by the gripper command path.
    # Servo: 0-270 degrees maps to 500-2500 us. ~1800 us = teddy grip position.
    gripper_min_us: 500
    gripper_max_us: 2500

robotarm_safety:
  ros__parameters:
    # Request topics are written by teleop, teddy_grab, and any high-level arm logic.
    x_request_topic: /robotarm/request/x_position
    z_request_topic: /robotarm/request/z_position
    left_gripper_request_topic: /gripper/request/left_position
    right_gripper_request_topic: /gripper/request/right_position

    # Command topics go to the Mega driver.
    x_command_topic: /robotarm/x_position_cmd
    z_command_topic: /robotarm/z_position_cmd
    left_gripper_command_topic: /gripper/left_position_cmd
    right_gripper_command_topic: /gripper/right_position_cmd

    # Feedback from Mega driver.
    x_state_topic: /robotarm/x_position_state
    z_state_topic: /robotarm/z_position_state
    joint_states_topic: /joint_states
    x_joint_name: robotarm_x_joint
    z_joint_name: robotarm_z_joint

    publish_period_s: 0.05

    # Allowed commanded workspace in meters. Matches minimal_all.launch.py.
    x_min: -0.07
    x_max: 0.082
    z_min: 0.0
    z_max: 0.25

    # Max target jump per publish. Physical speed is set by the Mega firmware;
    # these are large to avoid chopping one smooth arm move into many serial commands.
    max_x_step_per_publish: 0.20
    max_z_step_per_publish: 0.30

    # Keepout to avoid moving low over the LiDAR/front structure.
    lidar_x_threshold: 0.0
    lidar_z_clearance: 0.13

    # Chassis keepout in internal joint coordinates. GUI z=0 maps to joint z=0.13,
    # so if display Z is below 0, x must not retract behind 0.
    chassis_x_min_when_low_z: 0.0
    chassis_z_threshold: 0.13

    # Gripper pulse clamp in microseconds.
    # Servo: 0-270 degrees = 500-2500 us; ~1800 us = teddy grip.
    gripper_min: 500.0
    gripper_max: 2500.0

    # Startup command state before feedback arrives.
    initial_x: -0.07
    initial_z: 0.13
    initial_left_gripper: 500.0
    initial_right_gripper: 500.0

    startup_lock_s: 0.0
    spawn_x: -0.07
    spawn_z: 0.13
