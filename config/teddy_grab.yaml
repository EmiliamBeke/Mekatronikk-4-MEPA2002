teddy_grab:
  ros__parameters:
    enabled: true
    mode_topic: /teddy_approach/mode
    trigger_mode: close_enough_lidar

    # While the arm is grabbing, publish zero velocity on the same assist topic
    # Nav2 uses for teddy approach. This keeps the base stopped through cmd_vel_mux.
    cmd_vel_topic: /cmd_vel_teddy
    stop_base_while_active: true

    # Requests go through robotarm_safety before reaching the Mega driver.
    x_topic: /robotarm/request/x_position
    z_topic: /robotarm/request/z_position
    left_gripper_topic: /gripper/request/left_position
    right_gripper_topic: /gripper/request/right_position

    # Feedback from Mega driver.
    x_state_topic: /robotarm/x_position_state
    z_state_topic: /robotarm/z_position_state
    distance_topic: /mega/distance_mm
    teddy_status_topic: /teddy_detector/status
    scan_topic: /lidar

    publish_period_s: 0.05
    position_tolerance_m: 0.003
    distance_timeout_s: 0.5
    detector_status_timeout_s: 1.0
    scan_timeout_s: 0.5
    require_state_feedback: true

    # Sequence positions in meters.
    safe_x: 0.085
    safe_z: 0.12
    lower_z: 0.03
    grab_x: 0.15
    approach_x_max: 0.18
    approach_x_step_m: 0.002
    lift_z: 0.21
    final_x: 0.0

    # Continue moving X forward until the VL53 distance sensor reports <= 20 mm
    # for long enough.
    use_distance_contact: true
    require_distance_feedback: true
    contact_distance_mm: 35
    contact_hold_s: 0.10

    # Optional rough image-to-height correction from teddy_detector dy only.
    # This is empirical, not geometric calibration.
    use_detector_dy_for_grab_z: false
    dy_to_z_gain_m: 0.04

    # Preferred pre-grab Z estimate: sample teddy_detector dy and front LiDAR
    # before the gripper blocks the camera. The formula is:
    # z = origin + sign * lidar_m * tan(camera_pitch_down + dy * vertical_fov/2) + offset
    # Positive dy means teddy center is below image center.
    use_lidar_geometry_for_grab_z: true
    scan_front_angle_rad: 0.20
    scan_min_points: 3
    camera_vertical_fov_rad: 0.80
    camera_pitch_down_rad: 0.0
    lidar_geometry_z_origin_m: 0.01
    lidar_geometry_z_sign: -1.0
    lidar_geometry_z_offset_m: 0.0
    grab_z_min: 0.0
    grab_z_max: 0.12

    # Servo pulse widths in microseconds.
    gripper_open: 500.0
    gripper_closed: 1800.0

    # Per-step hold times.
    move_hold_s: 0.2
    grab_hold_s: 0.8
    final_hold_s: 0.5
